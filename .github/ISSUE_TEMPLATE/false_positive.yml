name: False positive
description: Report a rule that fired on a workflow you believe is safe.
title: "[False positive]: "
labels: ["false-positive"]
body:
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: APG003
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow snippet
      description: Include the smallest workflow snippet that triggers the finding.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: why-safe
    attributes:
      label: Why this is safe
      description: Explain the isolation, permission boundary, or other control that makes this finding too noisy.
    validations:
      required: true
